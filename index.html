<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leo Club of Mumbai Carter Road — Monthly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#8B1E2D; --maroon-dark:#7F1B29;
    --gold:#F4C430; --gold-deep:#C99A12;
    --orange:#E76F2E; --rose:#C9788F;
    --charcoal:#2C2C2C; --cream:#F7F3EE; --cream-2:#FBF8F3; --paper:#FFFFFF;
    --sage:#A3B18A; --line:#EADFD2; --line-soft:#F0E8DD; --muted:#9a9088;
    --shadow:0 18px 50px -24px rgba(60,30,20,.35);
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);color:var(--charcoal);
    background:radial-gradient(1200px 600px at 80% -10%, #fff 0%, transparent 60%),linear-gradient(160deg,#F8F4EE 0%, #F1E9DD 100%);
    min-height:100vh;padding:34px 18px 70px;-webkit-font-smoothing:antialiased;
  }
  .sheet{max-width:1120px;margin:0 auto;background:var(--paper);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:34px 38px 44px;position:relative;overflow:hidden;}
  .sheet>*{position:relative;z-index:1;}

  /* Header */
  header.top{text-align:center;margin-bottom:8px;}
  .logo{width:auto;height:170px;max-width:92%;object-fit:contain;display:block;margin:0 auto 2px;filter:drop-shadow(0 8px 18px rgba(139,30,45,.16));}
  .club{letter-spacing:.32em;text-transform:uppercase;font-size:11px;font-weight:600;color:var(--maroon);margin-bottom:8px;}
  h1.title{font-family:var(--serif);font-weight:800;font-size:clamp(40px,7vw,72px);line-height:.95;margin:0;color:var(--charcoal);letter-spacing:.01em;}
  h1.title span{font-weight:500;font-style:italic;color:var(--maroon);}
  .tagline{font-family:var(--serif);font-style:italic;color:var(--maroon);font-size:15px;margin-top:22px;}
  .divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px auto 4px;}
  .divider::before,.divider::after{content:"";height:1px;width:64px;background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .divider svg{width:16px;height:16px;fill:var(--maroon);}

  /* Month nav */
  .monthbar{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px auto 16px;flex-wrap:wrap;}
  .navbtn{border:1px solid var(--line);background:var(--cream-2);color:var(--maroon);width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:grid;place-items:center;transition:.15s;}
  .navbtn:hover{background:var(--maroon);color:#fff;border-color:var(--maroon);}
  .month-picker{display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;}
  .month-picker select{
    font-family:var(--serif);font-size:clamp(24px,4vw,34px);font-weight:700;color:var(--charcoal);
    border:1px solid transparent;background-color:transparent;cursor:pointer;
    -webkit-appearance:none;appearance:none;
    padding:2px 30px 2px 10px;border-radius:10px;text-align:center;text-align-last:center;
    background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='%238B1E2D'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 7px center;background-size:13px;
    transition:.15s;
  }
  .month-picker select:hover{background-color:var(--cream-2);border-color:var(--line);}
  .month-picker select:focus{outline:none;background-color:var(--cream-2);border-color:var(--maroon);}
  .month-picker select option{font-size:15px;font-weight:500;color:var(--charcoal);}
  #yearSel{color:var(--gold-deep);font-weight:600;}

  .banner{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0 auto 18px;}
  .banner .pill{font-size:12px;font-weight:600;padding:6px 15px;border-radius:999px;background:color-mix(in srgb,var(--c) 14%,#fff);border:1px solid var(--c);color:color-mix(in srgb,var(--c) 80%,#000);display:inline-flex;gap:7px;align-items:center;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;}
  .tool{font-size:12px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--charcoal);padding:7px 14px;border-radius:999px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
  .tool:hover{border-color:var(--maroon);color:var(--maroon);background:var(--cream-2);}
  .tool.lock{border-color:var(--gold-deep);color:var(--gold-deep);}
  .tool.lock:hover{background:#fdf6e6;border-color:var(--gold-deep);color:var(--maroon);}
  body.editing .tool.lock{background:var(--maroon);color:#fff;border-color:var(--maroon);}
  .editonly{display:none !important;}
  body.editing .editonly{display:inline-flex !important;}

  /* Calendar */
  .cal{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper);}
  .cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--maroon);}
  .cal-head div{padding:11px 6px;text-align:center;color:#fbeede;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;}
  .cal-head div:nth-child(6),.cal-head div:nth-child(7){color:var(--gold);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .cell{min-width:0;min-height:104px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:6px 7px;position:relative;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:3px;background:var(--paper);}
  .cell:nth-child(7n){border-right:none;}
  .cell:hover{background:var(--cream-2);}
  .cell.empty{background:repeating-linear-gradient(45deg,#fbf8f3,#fbf8f3 8px,#f6f0e7 8px,#f6f0e7 16px);cursor:default;}
  .cell.empty:hover{background:repeating-linear-gradient(45deg,#fbf8f3,#fbf8f3 8px,#f6f0e7 8px,#f6f0e7 16px);}
  .cell.today{background:#fdf6e6;box-shadow:inset 0 0 0 2px var(--gold);}
  .cell.has{cursor:pointer;}
  .daynum{font-size:13px;font-weight:600;color:var(--charcoal);width:24px;height:24px;display:grid;place-items:center;}
  .cell.today .daynum{background:var(--maroon);color:#fff;border-radius:50%;}
  .cell.weekend .daynum{color:var(--maroon);}
  .addhint{position:absolute;top:7px;right:8px;color:var(--muted);font-size:15px;opacity:0;transition:.12s;line-height:1;display:none;}
  body.editing .cell:hover .addhint{opacity:1;display:block;}
  .chips{display:flex;flex-direction:column;gap:3px;overflow:hidden;min-width:0;}
  .chip{font-size:10.5px;line-height:1.25;padding:2px 6px;border-radius:5px;overflow:hidden;border-left:3px solid;font-weight:500;}
  .chip .cdot{display:none;}
  .chip .ctxt{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .more{font-size:9.5px;color:var(--muted);padding-left:2px;font-weight:600;}

  .cat-service{--c:var(--maroon);}
  .cat-leadership{--c:var(--orange);}
  .cat-fellowship{--c:var(--gold-deep);}
  .cat-birthday{--c:var(--rose);}
  .cat-important{--c:var(--charcoal);}
  .cat-priorities{--c:var(--gold-deep);}
  .chip[data-c]{background:color-mix(in srgb,var(--c) 13%,#fff);border-color:var(--c);color:color-mix(in srgb,var(--c) 78%,#000);}

  .legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin:14px auto 0;font-size:11.5px;color:var(--muted);font-weight:500;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:11px;height:11px;border-radius:3px;background:var(--c);display:inline-block;}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px;}
  .card{border:1px solid var(--line);border-radius:14px;background:var(--cream-2);display:flex;flex-direction:column;overflow:hidden;min-height:150px;}
  .card-h{text-align:center;padding:10px 12px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--ch,var(--maroon));}
  .card-h .ic{width:25px;height:25px;border-radius:50%;background:rgba(255,255,255,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.28);display:inline-grid;place-items:center;flex:0 0 auto;}
  .card-h .ic svg{width:15px;height:15px;fill:#fff;display:block;}
  .card-b{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:2px;}
  .card-foot{padding:8px 14px 12px;}
  .addrow{width:100%;border:1px dashed var(--line);background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;padding:7px;border-radius:8px;cursor:pointer;transition:.15s;display:none;}
  body.editing .addrow{display:block;}
  .addrow:hover{border-color:var(--c-accent,var(--maroon));color:var(--c-accent,var(--maroon));background:#fff;}

  .item{display:flex;align-items:flex-start;gap:9px;padding:7px 6px;border-bottom:1px dashed var(--line-soft);font-size:13.5px;line-height:1.35;position:relative;}
  .item:last-child{border-bottom:none;}
  .item .dt{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.03em;background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--maroon);min-width:54px;text-align:center;margin-top:1px;}
  .item .txt{flex:1;color:var(--charcoal);word-break:break-word;}
  body.editing .item .txt{cursor:pointer;}
  .item .x{display:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:2px 4px;border-radius:5px;transition:.12s;}
  body.editing .item:hover .x{display:block;}
  .item .x:hover{color:#fff;background:var(--maroon);}
  .empty-note{color:var(--muted);font-size:12.5px;font-style:italic;padding:10px 4px;text-align:center;}
  body.editing .item.locked .x{display:none !important;}
  body.editing .item.locked .txt{cursor:default;}

  .prio .item{align-items:center;}
  .prio .num{flex:0 0 auto;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--maroon);width:24px;text-align:center;}
  .prio .star{color:var(--line);font-size:16px;pointer-events:none;}
  body.editing .prio .star{pointer-events:auto;cursor:pointer;}
  .prio .star.on{color:var(--gold);text-shadow:0 0 1px var(--gold-deep);}
  .prio .item.done .txt{text-decoration:line-through;color:var(--muted);}

  /* Scrolling ticker (matches site footer marquee) */
  .ticker{margin:30px -38px -44px;background:#1A1A1A;overflow:hidden;border-top:1px solid rgba(255,255,255,.12);padding:9px 0;-webkit-mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask-image:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);}
  .ticker-track{display:flex;align-items:center;width:max-content;animation:ticker 40s linear infinite;}
  .ticker:hover .ticker-track{animation-play-state:paused;}
  .tword{font-family:var(--serif);font-style:italic;font-weight:500;font-size:18px;white-space:nowrap;line-height:1;}
  .tw-gold{color:var(--gold);}
  .tw-white{color:#fff;}
  .tw-maroon{color:#C4445A;}
  .tsep{color:var(--gold);margin:0 17px;font-size:9px;opacity:.85;}
  @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  .motto{text-align:center;margin-top:26px;color:var(--maroon);font-size:11px;letter-spacing:.34em;text-transform:uppercase;font-weight:600;}
  .motto .dot{color:var(--gold-deep);margin:0 7px;}

  /* Modals */
  .overlay{position:fixed;inset:0;background:rgba(44,30,28,.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;box-shadow:0 30px 80px -20px rgba(0,0,0,.45);overflow:hidden;animation:pop .16s ease;}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0;}to{transform:none;opacity:1;}}
  .modal-h{background:var(--maroon);color:#fff;padding:15px 20px;font-family:var(--serif);font-size:20px;font-weight:600;display:flex;align-items:center;gap:10px;}
  .modal-h small{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;opacity:.85;margin-left:auto;}
  .modal-b{padding:18px 20px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow:auto;}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field input,.field select{width:100%;font-family:var(--sans);font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;color:var(--charcoal);background:var(--cream-2);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--maroon);background:#fff;}
  .two{display:flex;gap:12px;}
  .two .field{flex:1;}
  .modal-f{display:flex;gap:10px;padding:0 20px 20px;}
  .btn{flex:1;font-family:var(--sans);font-size:13px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--charcoal);transition:.15s;}
  .btn:hover{background:var(--cream-2);}
  .btn.primary{background:var(--maroon);color:#fff;border-color:var(--maroon);}
  .btn.primary:hover{background:var(--maroon-dark);}
  .btn.danger{color:var(--maroon);border-color:var(--rose);}
  .btn.danger:hover{background:#fbeef0;}
  .btn.hidden{display:none;}

  /* day-view popup rows */
  .dayrow{display:flex;gap:10px;align-items:flex-start;padding:10px 2px;border-bottom:1px dashed var(--line-soft);}
  .dayrow:last-child{border-bottom:none;}
  .dayrow .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:6px;white-space:nowrap;background:color-mix(in srgb,var(--c) 15%,#fff);border:1px solid var(--c);color:color-mix(in srgb,var(--c) 78%,#000);margin-top:2px;}
  .dayrow .dtxt{flex:1;font-size:14.5px;color:var(--charcoal);}
  .dayrow .dsub{font-size:11px;color:var(--muted);margin-top:2px;}

  @media (max-width:820px){.cards{grid-template-columns:repeat(2,1fr);}.sheet{padding:24px 18px 30px;}.cell{min-height:82px;}.ticker{margin-left:-18px;margin-right:-18px;margin-bottom:-30px;}}
  @media (max-width:540px){.cards{grid-template-columns:1fr;}.month-label{min-width:0;}.tword{font-size:16px;}.logo{height:118px;}}

  /* Phones: cells are too narrow for text — show colored dots, tap the day for full details */
  @media (max-width:600px){
    /* keep prev-arrow · month · year · next-arrow all on one line */
    .monthbar{gap:4px;flex-wrap:nowrap;}
    .navbtn{width:34px;height:34px;font-size:15px;flex:0 0 auto;}
    .month-picker{gap:0;flex-wrap:nowrap;}
    .month-picker select{font-size:20px;padding:2px 20px 2px 5px;background-size:10px;background-position:right 3px center;}
    .cell{min-height:66px;padding:5px 4px;}
    .chips{flex-direction:row;flex-wrap:wrap;gap:3px;align-items:center;margin-top:1px;}
    .chip{padding:0;border:none;border-left:none;border-radius:0;background:transparent !important;overflow:visible;}
    .chip .ctxt{display:none;}
    .chip .cdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--c);}
    .chip.cat-birthday .cdot{width:auto;height:auto;border-radius:0;background:transparent;font-size:12px;line-height:1;}
    .more{font-size:8.5px;width:100%;}
    .daynum{font-size:12px;}
  }

  @media print{
    body{background:#fff;padding:0;}
    .sheet{box-shadow:none;border:none;border-radius:0;max-width:100%;}
    .toolbar,.navbtn,.addhint{display:none !important;}
    .cell{min-height:90px;}.card{break-inside:avoid;}
  }
</style>
</head>

  let data = load();
  let editMode = false;
  const now = new Date();
  let cur = {y: 2026, m: 5}; // default to June 2026
  // open on the real current month if we have data near it
  if(!(now.getFullYear()===2026 && now.getMonth()===5)) cur = {y:now.getFullYear(), m:now.getMonth()};

  function load(){
    try{ const s=localStorage.getItem(STORE); if(s) return JSON.parse(s); }catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  function persist(){ localStorage.setItem(STORE, JSON.stringify(data)); }
  function key(){ return cur.y + '-' + String(cur.m+1).padStart(2,'0'); }
  function md(){
    const k=key();
    if(!data[k]) data[k]={events:[],priorities:[]};
    if(!data[k].events) data[k].events=[];
    if(!data[k].priorities) data[k].priorities=[];
    return data[k];
  }
  const uid = () => 'x'+Math.random().toString(36).slice(2,9);
  const mShort = () => MONTHS[cur.m].slice(0,3);
  function badge(e){
    if(e.allMonth) return 'All month';
    if(e.end && e.end!==e.day) return mShort()+' '+e.day+'–'+e.end;
    return mShort()+' '+e.day;
  }
  // recurring annual observances mapped onto the current month (read-only)
  function annualForMonth(){
    const mm=cur.m+1;
    return ANNUAL.filter(a=>a.m===mm).map((a,i)=>({id:'ann-'+mm+'-'+a.d+'-'+i, day:a.d, end:a.end, cat:'important', title:a.t, _fixed:true}));
  }
  // nth weekday (wd: 0=Sun..6=Sat) of the current month, or null if it doesn't exist
  function nthWeekday(y,m,nth,wd){
    const first=new Date(y,m,1).getDay();
    const day=1+((wd-first+7)%7)+(nth-1)*7;
    return day<=new Date(y,m+1,0).getDate() ? day : null;
  }
  function inRecurRange(){
    const cy=cur.y*12+cur.m, f=RECUR_FROM.y*12+RECUR_FROM.m, t=RECUR_TO.y*12+RECUR_TO.m;
    return cy>=f && cy<=t;
  }
  // recurring club events computed for the current month (read-only)
  function recurForMonth(){
    if(!inRecurRange()) return [];
    const out=[];
    RECUR.forEach((r,i)=>{
      let d=null;
      if(r.quarterMonths){ if(r.quarterMonths.includes(cur.m+1)) d=r.day; }
      else if(r.nth){ d=nthWeekday(cur.y,cur.m,r.nth,r.wd); }
      else if(r.day){ d=r.day; }
      if(d) out.push({id:'rec-'+i+'-'+cur.y+'-'+cur.m, day:d, cat:r.cat, title:r.t, _fixed:true});
    });
    return out;
  }
  // recurring member birthdays for the current month (read-only)
  function birthdaysForMonth(){
    const mm=cur.m+1;
    return BIRTHDAYS.filter(b=>b.m===mm).map((b,i)=>({id:'bd-'+mm+'-'+b.d+'-'+i, day:b.d, cat:'birthday', title:b.n, _fixed:true}));
  }
  // one-time events + recurring observances + recurring club events + birthdays, combined for display
  function allEvents(){ return md().events.concat(annualForMonth(), recurForMonth(), birthdaysForMonth()); }
  const isMobile = () => window.matchMedia('(max-width:600px)').matches;

  /* ===== Render ===== */
  function render(){
    syncPicker();
    renderBanner(); renderGrid(); renderCards();
  }

  function buildMonthPicker(){
    const ms=document.getElementById('monthSel');
    ms.innerHTML=MONTHS.map((m,i)=>'<option value="'+i+'">'+m+'</option>').join('');
    ms.onchange=e=>{ cur.m=parseInt(e.target.value,10); render(); };
    document.getElementById('yearSel').onchange=e=>{ cur.y=parseInt(e.target.value,10); render(); };
  }
  function syncPicker(){
    const ys=document.getElementById('yearSel');
    const lo=Math.min(2024,cur.y), hi=Math.max(2035,cur.y); // always include the current year even if arrowed beyond
    let opts=''; for(let y=lo;y<=hi;y++) opts+='<option value="'+y+'">'+y+'</option>';
    ys.innerHTML=opts;
    document.getElementById('monthSel').value=cur.m;
    ys.value=cur.y;
  }

  function renderBanner(){
    const b=document.getElementById('banner'); b.innerHTML='';
    md().events.filter(e=>e.allMonth).forEach(e=>{
      const p=document.createElement('div'); p.className='pill cat-'+e.cat;
      p.innerHTML='<span>★</span> '+escapeHtml(e.title)+' — all month';
      if(editMode){ p.style.cursor='pointer'; p.onclick=()=>openEvent({id:e.id}); }
      b.appendChild(p);
    });
  }

  function dayEvents(d){
    return allEvents().filter(e=>!e.allMonth && (e.day===d || (e.end && d>=e.day && d<=e.end)));
  }

  function renderGrid(){
    const grid=document.getElementById('grid'); grid.innerHTML='';
    const first=new Date(cur.y,cur.m,1).getDay();
    const lead=(first+6)%7;
    const days=new Date(cur.y,cur.m+1,0).getDate();
    const total=Math.ceil((lead+days)/7)*7;
    const isThisMonth=(now.getFullYear()===cur.y && now.getMonth()===cur.m);

    for(let i=0;i<total;i++){
      const dnum=i-lead+1;
      const cell=document.createElement('div');
      if(dnum<1||dnum>days){ cell.className='cell empty'; grid.appendChild(cell); continue; }
      const col=i%7;
      const evs=dayEvents(dnum);
      cell.className='cell'+(col>=5?' weekend':'')+(isThisMonth&&dnum===now.getDate()?' today':'')+(evs.length?' has':'');
      cell.dataset.day=dnum;
      const head=document.createElement('div');
      head.style.cssText='display:flex;justify-content:space-between;align-items:center;';
      head.innerHTML='<div class="daynum">'+dnum+'</div><div class="addhint">+</div>';
      cell.appendChild(head);
      const chips=document.createElement('div'); chips.className='chips';
      const limit = isMobile() ? 8 : 3;   // dots are tiny, so show more of them on phones
      evs.slice(0,limit).forEach(e=>{
        const c=document.createElement('div');
        c.className='chip cat-'+e.cat; c.dataset.c=e.cat; c.dataset.id=e.id; if(e._fixed) c.dataset.fixed='1';
        c.title=(CAT_SINGULAR[e.cat]||'Event')+': '+e.title;
        const dot=document.createElement('span'); dot.className='cdot'; if(e.cat==='birthday') dot.textContent='🎂';
        const tx=document.createElement('span'); tx.className='ctxt'; tx.textContent=(e.cat==='birthday'?'🎂 ':'')+e.title;
        c.appendChild(dot); c.appendChild(tx);
        chips.appendChild(c);
      });
      if(evs.length>limit){ const m=document.createElement('div'); m.className='more'; m.textContent='+'+(evs.length-limit)+' more'; chips.appendChild(m); }
      cell.appendChild(chips);
      grid.appendChild(cell);
    }
  }

  function renderCards(){
    const wrap=document.getElementById('cards'); wrap.innerHTML='';
    wrap.appendChild(prioritiesCard());
    Object.keys(CATS).forEach(cat=>wrap.appendChild(eventCard(cat)));
  }

  function eventCard(cat){
    const card=document.createElement('div'); card.className='card';
    card.innerHTML='<div class="card-h" style="--ch:'+CARD_COLOR[cat]+'"><span class="ic"><svg viewBox="0 0 24 24"><path d="'+CATS[cat].icon+'"/></svg></span>'+CATS[cat].label+'</div><div class="card-b"></div><div class="card-foot"></div>';
    const body=card.querySelector('.card-b');
    const list=allEvents().filter(e=>e.cat===cat).sort((a,b)=>a.day-b.day);
    if(!list.length){ body.innerHTML='<div class="empty-note">Nothing scheduled.</div>'; }
    else list.forEach(e=>{
      const row=document.createElement('div'); row.className='item'+(e._fixed?' locked':'');
      row.innerHTML='<span class="dt">'+badge(e)+'</span><span class="txt"></span><span class="x" title="Delete">✕</span>';
      row.querySelector('.txt').textContent=e.title;
      if(editMode && !e._fixed){
        row.querySelector('.txt').onclick=()=>openEvent({id:e.id});
        row.querySelector('.x').onclick=()=>removeEvent(e.id);
      }
      body.appendChild(row);
    });
    const add=document.createElement('button'); add.className='addrow';
    add.style.setProperty('--c-accent',CARD_COLOR[cat]);
    add.textContent='+ Add '+CATS[cat].label.replace(/s$/,'').toLowerCase();
    add.onclick=()=>openEvent({cat});
    card.querySelector('.card-foot').appendChild(add);
    return card;
  }

  function prioritiesCard(){
    const card=document.createElement('div'); card.className='card prio';
    card.innerHTML='<div class="card-h" style="--ch:'+CARD_COLOR.priorities+'"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg></span>Top Priorities</div><div class="card-b"></div><div class="card-foot"></div>';
    const body=card.querySelector('.card-b');
    const recurs=allEvents().filter(e=>e.cat==='priorities').sort((a,b)=>a.day-b.day);
    const list=md().priorities;
    if(!recurs.length && !list.length){ body.innerHTML='<div class="empty-note">Nothing yet.</div>'; }
    // recurring club events (read-only), shown with their date
    recurs.forEach(e=>{
      const row=document.createElement('div'); row.className='item locked';
      row.innerHTML='<span class="dt">'+badge(e)+'</span><span class="txt"></span>';
      row.querySelector('.txt').textContent=e.title;
      body.appendChild(row);
    });
    // manual priorities (editable, numbered, star-able)
    list.forEach((p,i)=>{
      const row=document.createElement('div'); row.className='item'+(p.star?' done':'');
      row.innerHTML='<span class="num">'+(i+1)+'</span><span class="txt"></span><span class="star'+(p.star?' on':'')+'" title="Mark done">★</span><span class="x" title="Delete">✕</span>';
      row.querySelector('.txt').textContent=p.text;
      if(editMode){
        row.querySelector('.txt').onclick=()=>editPriority(p.id);
        row.querySelector('.star').onclick=()=>{ p.star=!p.star; persist(); renderCards(); };
        row.querySelector('.x').onclick=()=>{ md().priorities=md().priorities.filter(x=>x.id!==p.id); persist(); renderCards(); };
      }
      body.appendChild(row);
    });
    const add=document.createElement('button'); add.className='addrow';
    add.style.setProperty('--c-accent',CARD_COLOR.priorities);
    add.textContent='+ Add priority';
    add.onclick=()=>{ const t=prompt('New priority:'); if(t&&t.trim()){ md().priorities.push({id:uid(),text:t.trim(),star:false}); persist(); renderCards(); } };
    card.querySelector('.card-foot').appendChild(add);
    return card;
  }
  function editPriority(id){
    const p=md().priorities.find(x=>x.id===id); if(!p) return;
    const t=prompt('Edit priority:',p.text); if(t===null) return;
    if(t.trim()==='') md().priorities=md().priorities.filter(x=>x.id!==id); else p.text=t.trim();
    persist(); renderCards();
  }

  /* ===== Day details popup (read-only, everyone) ===== */
  const dayOverlay=document.getElementById('dayOverlay');
  function openDayView(d){
    const evs=allEvents().filter(e=>e.allMonth || e.day===d || (e.end && d>=e.day && d<=e.end));
    document.getElementById('dayTitle').textContent=MONTHS[cur.m]+' '+d+', '+cur.y;
    const body=document.getElementById('dayBody');
    if(!evs.length){ body.innerHTML='<div class="empty-note">Nothing scheduled on this day.</div>'; }
    else{
      body.innerHTML='';
      evs.sort((a,b)=>(a.allMonth?-1:0)-(b.allMonth?-1:0));
      evs.forEach(e=>{
        const r=document.createElement('div'); r.className='dayrow cat-'+e.cat;
        const sub = e.allMonth ? 'All month' : (e.end&&e.end!==e.day ? badge(e) : '');
        r.innerHTML='<span class="tag">'+(CAT_SINGULAR[e.cat]||'Event')+'</span><div><div class="dtxt"></div>'+(sub?'<div class="dsub">'+sub+'</div>':'')+'</div>';
        r.querySelector('.dtxt').textContent=(e.cat==='birthday'?'🎂 ':'')+e.title;
        body.appendChild(r);
      });
    }
    dayOverlay.classList.add('show');
  }

  /* ===== Edit modal (owner) ===== */
  const overlay=document.getElementById('overlay');
  let editingId=null;
  function openEvent({id=null,day=null,cat='service'}={}){
    editingId=id;
    const ev=id?md().events.find(e=>e.id===id):null;
    document.getElementById('modalTitle').textContent=ev?'Edit Entry':'Add Entry';
    document.getElementById('fTitle').value=ev?ev.title:'';
    document.getElementById('fDay').value=ev?ev.day:(day||'');
    document.getElementById('fEnd').value=ev&&ev.end?ev.end:'';
    document.getElementById('fCat').value=ev?ev.cat:cat;
    document.getElementById('mDelete').classList.toggle('hidden',!ev);
    overlay.classList.add('show');
    setTimeout(()=>document.getElementById('fTitle').focus(),30);
  }
  function closeModal(){ overlay.classList.remove('show'); editingId=null; }
  function saveEvent(){
    const title=document.getElementById('fTitle').value.trim();
    const day=parseInt(document.getElementById('fDay').value,10);
    const endRaw=document.getElementById('fEnd').value;
    const end=endRaw?parseInt(endRaw,10):null;
    const cat=document.getElementById('fCat').value;
    const maxDay=new Date(cur.y,cur.m+1,0).getDate();
    if(!title){ alert('Please enter a title.'); return; }
    if(!day||day<1||day>maxDay){ alert('Enter a valid day (1–'+maxDay+').'); return; }
    if(end&&(end<day||end>maxDay)){ alert('End day must be between the start day and '+maxDay+'.'); return; }
    const rec={title,day,cat}; if(end&&end!==day) rec.end=end;
    if(editingId){ const e=md().events.find(x=>x.id===editingId); delete e.end; Object.assign(e,rec); }
    else md().events.push(Object.assign({id:uid()},rec));
    persist(); closeModal(); render();
  }
  function removeEvent(id){ md().events=md().events.filter(e=>e.id!==id); persist(); render(); }

  /* ===== Mode toggle ===== */
  function setMode(on){
    editMode=on;
    document.body.classList.toggle('editing',on);
    const lb=document.getElementById('lockBtn'); lb.textContent=on?'🔓':'🔒'; lb.title=on?'Exit edit mode':'Owner edit (enter PIN)';
    render();
  }
  document.getElementById('lockBtn').onclick=()=>{
    if(editMode){ setMode(false); return; }
    const pin=prompt('Enter owner PIN to edit:');
    if(pin===null) return;
    if(pin===OWNER_PIN) setMode(true);
    else alert('Incorrect PIN. The calendar stays in view-only mode.');
  };

  /* ===== Publish updated copy ===== */
  async function publishCopy(){
    try{
      const res=await fetch(location.href); let src=await res.text();
      const json=JSON.stringify(data);
      src=src.replace(/\/\*__DATA__\*\/[\s\S]*?\/\*__\/DATA__\*\//, ()=> '/*__DATA__*/'+json+'/*__/DATA__*/');
      download(new Blob([src],{type:'text/html'}),'index.html');
      alert('Downloaded an updated "index.html" with your changes baked in.\nShare that file (or upload it where you host the calendar) so members see the latest.');
    }catch(e){
      alert('Could not read the file directly — this happens when it is opened straight from disk (file://).\nUse "Backup (.json)" instead, or host the file on a server, then Publish copy will work.');
    }
  }
  function download(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

  /* ===== Wiring ===== */
  document.getElementById('grid').addEventListener('click',e=>{
    const cell=e.target.closest('.cell'); if(!cell||cell.classList.contains('empty')) return;
    const d=parseInt(cell.dataset.day,10);
    if(editMode){
      const chip=e.target.closest('.chip');
      if(chip){ if(chip.dataset.fixed){ openDayView(d); } else { openEvent({id:chip.dataset.id}); } } else { openEvent({day:d}); }
    } else {
      if(dayEvents(d).length || md().events.some(x=>x.allMonth)) openDayView(d);
    }
  });
  document.getElementById('prev').onclick=()=>{ cur.m--; if(cur.m<0){cur.m=11;cur.y--;} render(); };
  document.getElementById('next').onclick=()=>{ cur.m++; if(cur.m>11){cur.m=0;cur.y++;} render(); };
  document.getElementById('todayBtn').onclick=()=>{ cur={y:now.getFullYear(),m:now.getMonth()}; render(); };
  document.getElementById('printBtn').onclick=()=>window.print();
  document.getElementById('publishBtn').onclick=publishCopy;
  document.getElementById('clearBtn').onclick=()=>{ if(confirm('Clear all entries for '+MONTHS[cur.m]+' '+cur.y+'?')){ delete data[key()]; persist(); render(); } };
  document.getElementById('exportBtn').onclick=()=>download(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),'lcmr-planner-backup.json');
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=ev=>{
    const f=ev.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(confirm('Restore this backup? It replaces current data.')){ data=d; persist(); render(); } }catch(err){ alert('Invalid backup file.'); } };
    r.readAsText(f); ev.target.value='';
  };
  document.getElementById('mSave').onclick=saveEvent;
  document.getElementById('mCancel').onclick=closeModal;
  document.getElementById('mDelete').onclick=()=>{ if(editingId) removeEvent(editingId); closeModal(); };
  document.getElementById('dayClose').onclick=()=>dayOverlay.classList.remove('show');
  overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
  dayOverlay.addEventListener('click',e=>{ if(e.target===dayOverlay) dayOverlay.classList.remove('show'); });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ closeModal(); dayOverlay.classList.remove('show'); }
    if(e.key==='Enter' && overlay.classList.contains('show') && e.target.id==='fTitle') saveEvent();
  });

  function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  /* Scrolling ticker */
  (function(){
    const words=[['Roar','gold'],['Rise','white'],['Radiate','maroon'],['Belong','gold'],['Connect','white'],['Serve','maroon']];
    const block=words.map(w=>'<span class="tword tw-'+w[1]+'">'+w[0]+'</span><span class="tsep">✦</span>').join('');
    document.getElementById('ticker').innerHTML=block.repeat(4);
  })();

  buildMonthPicker();
  render();

  // re-render the grid when crossing the mobile/desktop breakpoint (e.g. phone rotation) so dot/text mode updates
  let wasMobile=isMobile(), rz;
  window.addEventListener('resize',()=>{ clearTimeout(rz); rz=setTimeout(()=>{ if(isMobile()!==wasMobile){ wasMobile=isMobile(); renderGrid(); } },200); });
})();
</script>
</body>
</html>
